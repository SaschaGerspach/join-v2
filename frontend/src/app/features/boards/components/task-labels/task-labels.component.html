<div class="field-group">
  <label class="field-label">{{ 'TASK.LABELS' | translate }}</label>
  <div class="label-options">
    @for (label of boardLabels(); track label.id) {
      <button
        class="label-toggle"
        [style.background]="label.color"
        [class.active]="selectedLabelIds().has(label.id)"
        [attr.aria-pressed]="selectedLabelIds().has(label.id)"
        (click)="toggleLabel(label.id)"
      >{{ label.name }}</button>
    }
  </div>
  <div class="label-add">
    <input
      class="field-input"
      type="text"
      aria-label="New label name"
      [(ngModel)]="newLabelName"
      [placeholder]="'TASK.NEW_LABEL' | translate"
      (keyup.enter)="createLabel()"
    />
    <input type="color" [(ngModel)]="newLabelColor" class="label-color-input" aria-label="Label color" />
    <button class="btn-add-sub" aria-label="Add label" (click)="createLabel()">+</button>
  </div>
</div>
