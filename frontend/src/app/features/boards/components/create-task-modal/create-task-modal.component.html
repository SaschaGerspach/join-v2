<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="create-task-title" (click)="cancelled.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 id="create-task-title">New Task</h2>
      <button class="btn-close" aria-label="Close" (click)="cancelled.emit()">&#10005;</button>
    </div>

    <div class="modal-body">

      <div class="field-group">
        <label class="field-label" for="create-task-title-input">Title *</label>
        <input
          id="create-task-title-input"
          #titleInput
          class="field-input"
          type="text"
          [(ngModel)]="title"
          placeholder="Task title"
          [class.field-error]="submitted && !title.trim()"
          (keyup.enter)="submit()"
        />
        @if (submitted && !title.trim()) {
          <span class="error-text">Title is required.</span>
        }
      </div>

      <div class="field-group">
        <label class="field-label">Description</label>
        <textarea
          class="field-textarea"
          rows="2"
          [(ngModel)]="description"
          placeholder="Optional description..."
        ></textarea>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Priority</label>
          <div class="priority-options">
            @for (p of priorities; track p) {
              <button
                type="button"
                class="priority-btn"
                [class]="'priority-' + p"
                [class.active]="priority === p"
                [attr.aria-pressed]="priority === p"
                (click)="priority = p"
              >{{ p }}</button>
            }
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Due date</label>
          <input
            class="field-input"
            type="date"
            [(ngModel)]="dueDate"
          />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Column</label>
          <select class="field-select" [(ngModel)]="selectedColumnId">
            @for (col of columns(); track col.id) {
              <option [ngValue]="col.id">{{ col.title }}</option>
            }
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Assign to</label>
          <div class="assignee-checklist">
            @for (c of contacts(); track c.id) {
              <label class="assignee-check-item">
                <input type="checkbox" [checked]="assignedTo.includes(c.id)" (change)="toggleAssignee(c.id)" />
                {{ c.first_name }} {{ c.last_name }}
              </label>
            }
            @if (contacts().length === 0) {
              <span class="no-contacts">No contacts available</span>
            }
          </div>
        </div>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancelled.emit()">Cancel</button>
      <button class="btn-save" (click)="submit()">Create Task</button>
    </div>

  </div>
</div>
