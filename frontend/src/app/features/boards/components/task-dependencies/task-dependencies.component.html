<div class="dependencies-section">
  <label class="field-label">{{ 'TASK.DEPENDENCIES' | translate }}</label>

  @if (dependencies().length) {
    <ul class="dependency-list">
      @for (dep of dependencies(); track dep.id) {
        <li class="dependency-item">
          <span class="dependency-title">{{ dep.title }}</span>
          <button class="btn-remove" [attr.aria-label]="'TASK.REMOVE_DEPENDENCY' | translate" (click)="removeDependency(dep)">&#10005;</button>
        </li>
      }
    </ul>
  }

  <div class="add-dependency">
    <select class="field-select" [ngModel]="selectedTaskId()" (ngModelChange)="selectedTaskId.set($event)">
      <option [ngValue]="null">{{ 'TASK.SELECT_TASK' | translate }}</option>
      @for (t of availableTasks(); track t.id) {
        <option [ngValue]="t.id">{{ t.title }}</option>
      }
    </select>
    <button class="btn-add" [disabled]="!selectedTaskId()" (click)="addDependency()">{{ 'COMMON.ADD' | translate }}</button>
  </div>
</div>

@if (pendingRemoveDep()) {
  <app-confirm-dialog
    [message]="'TASK.CONFIRM_REMOVE_DEPENDENCY' | translate"
    (confirmed)="confirmRemoveDependency()"
    (cancelled)="pendingRemoveDep.set(null)"
  />
}
