<div class="modal-backdrop" (click)="close()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <input
        #titleInput
        class="modal-title-input"
        type="text"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        placeholder="Task title"
      />
      <button class="btn-close" aria-label="Close" (click)="close()">&#10005;</button>
    </div>

    <div class="modal-body">

      <div class="field-group">
        <label class="field-label">Description</label>
        <textarea
          class="field-textarea"
          rows="3"
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
          placeholder="Add a description..."
        ></textarea>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Priority</label>
          <div class="priority-options">
            @for (p of priorities; track p) {
              <button
                class="priority-btn"
                [class]="'priority-' + p"
                [class.active]="priority() === p"
                (click)="priority.set(p)"
              >{{ p }}</button>
            }
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Due date</label>
          <input
            class="field-input"
            type="date"
            [ngModel]="dueDate()"
            (ngModelChange)="dueDate.set($event)"
          />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Column</label>
          <select
            class="field-select"
            [ngModel]="columnId()"
            (ngModelChange)="columnId.set($event)"
          >
            @for (col of columns(); track col.id) {
              <option [ngValue]="col.id">{{ col.title }}</option>
            }
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Assigned to</label>
          <select
            class="field-select"
            [ngModel]="assignedTo()"
            (ngModelChange)="assignedTo.set($event === 'null' ? null : +$event)"
          >
            <option [ngValue]="null">— Unassigned —</option>
            @for (contact of contacts(); track contact.id) {
              <option [ngValue]="contact.id">{{ contact.first_name }} {{ contact.last_name }}</option>
            }
          </select>
        </div>
      </div>

      <app-task-labels
        [boardId]="task().board"
        [(selectedLabelIds)]="selectedLabelIds"
      />

      <app-task-attachments [taskId]="task().id" />

      <app-task-subtasks
        [taskId]="task().id"
        (subtaskCountChanged)="onSubtaskCountChanged($event)"
      />

    </div>

    <app-task-comments [taskId]="task().id" />

    <div class="modal-footer">
      <button class="btn-danger" (click)="deleteTask()">Delete</button>
      <div class="footer-right">
        <button class="btn-cancel" (click)="close()">Cancel</button>
        <button class="btn-save" (click)="save()">Save</button>
      </div>
    </div>

  </div>
</div>

@if (showDeleteConfirm()) {
  <app-confirm-dialog
    message="Delete this task? This cannot be undone."
    (confirmed)="confirmDeleteTask()"
    (cancelled)="showDeleteConfirm.set(false)"
  />
}
