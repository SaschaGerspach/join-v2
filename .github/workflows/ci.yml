name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: join_test
          POSTGRES_USER: join
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U join"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: join_test
      POSTGRES_USER: join
      POSTGRES_PASSWORD: testpass
      POSTGRES_HOST: localhost
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "false"
      SECURE_SSL_REDIRECT: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Lint (ruff)
        run: pip install ruff==0.15.10 && ruff check .
        working-directory: backend

      - name: Security audit
        run: pip install pip-audit && pip-audit
        working-directory: backend

      - name: Run tests with coverage
        run: |
          pip install coverage
          coverage run manage.py test
          coverage report --fail-under=80
        working-directory: backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev
        working-directory: frontend

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadlessCI
        working-directory: frontend

      - name: Build
        run: npm run build -- --configuration=production
        working-directory: frontend

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: join-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: join-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
