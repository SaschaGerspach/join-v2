<div class="overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-msg" (click)="cancelled.emit()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <p class="message" id="confirm-dialog-msg">{{ message() }}</p>
    <div class="actions">
      <button class="btn-cancel" (click)="cancelled.emit()">Cancel</button>
      <button class="btn-delete" (click)="confirmed.emit()">Delete</button>
    </div>
  </div>
</div>
