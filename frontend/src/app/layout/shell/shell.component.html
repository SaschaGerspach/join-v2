<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">Join</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/summary" routerLinkActive="active">
        <span class="nav-icon">&#9632;</span>
        Summary
      </a>
      <a routerLink="/boards" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
        <span class="nav-icon">&#9776;</span>
        Boards
      </a>
      <a routerLink="/contacts" routerLinkActive="active">
        <span class="nav-icon">&#128100;</span>
        Contacts
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/privacy">Privacy Policy</a>
      <a routerLink="/legal">Legal Notice</a>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <span class="topbar-title">Kanban Project Management Tool</span>
      <div class="topbar-user">
        <div class="user-badge" (click)="toggleMenu()">
          {{ userInitials() }}
        </div>
        @if (menuOpen()) {
          <div class="user-menu">
            <a routerLink="/profile">My Profile</a>
            <button type="button" (click)="logout()">Log out</button>
          </div>
        }
      </div>
    </header>

    <section class="page">
      <router-outlet></router-outlet>
    </section>
  </div>

  <footer class="mobile-footer">
    <a routerLink="/summary" routerLinkActive="active">
      <span>&#9632;</span>
      <span>Summary</span>
    </a>
    <a routerLink="/boards" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
      <span>&#9776;</span>
      <span>Boards</span>
    </a>
    <a routerLink="/contacts" routerLinkActive="active">
      <span>&#128100;</span>
      <span>Contacts</span>
    </a>
  </footer>

</div>

<app-toast />
