<div class="time-tracking-section">
  <label class="field-label">{{ 'TASK.TIME_TRACKING' | translate }} <span class="total-time">({{ formatDuration(totalMinutes()) }} {{ 'TASK.TOTAL' | translate }})</span></label>

  <div class="log-time-form">
    <input
      class="field-input duration-input"
      type="number"
      min="1"
      max="1440"
      [attr.aria-label]="'TASK.DURATION_LABEL' | translate"
      [placeholder]="'TASK.DURATION_MIN' | translate"
      [ngModel]="newDuration()"
      (ngModelChange)="newDuration.set($event)"
    />
    <input
      class="field-input note-input"
      type="text"
      [attr.aria-label]="'TASK.TIME_NOTE_LABEL' | translate"
      [placeholder]="'TASK.NOTE_OPTIONAL' | translate"
      [ngModel]="newNote()"
      (ngModelChange)="newNote.set($event)"
      (keyup.enter)="logTime()"
    />
    <button class="btn-log" [disabled]="!newDuration()" (click)="logTime()">{{ 'TASK.LOG' | translate }}</button>
  </div>

  @if (entries().length) {
    <ul class="time-entries">
      @for (entry of entries(); track entry.id) {
        <li class="time-entry">
          <span class="entry-duration">{{ formatDuration(entry.duration_minutes) }}</span>
          <span class="entry-note">{{ entry.note || '—' }}</span>
          <span class="entry-user">{{ entry.user_name }}</span>
          <button class="btn-remove" [attr.aria-label]="'TASK.DELETE_TIME_ENTRY' | translate" (click)="deleteEntry(entry)">&#10005;</button>
        </li>
      }
    </ul>
  }
</div>
