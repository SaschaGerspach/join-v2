<div class="auth-page">
  <div class="auth-logo">
    <span>Join</span>
  </div>

  <div class="auth-card">
    <h1>Log in</h1>
    <div class="auth-divider"></div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <input
          class="form-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
          required
        />
      </div>

      <div class="form-group">
        <input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
        />
      </div>

      @if (error()) {
        <p class="error-message">{{ error() }}</p>
      }

      <div class="auth-actions">
        <button type="submit" class="btn-primary">Log in</button>
        <a routerLink="/register" class="btn-secondary">Sign up</a>
      </div>
    </form>
  </div>
</div>
