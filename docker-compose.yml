x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-join}
      POSTGRES_USER: ${POSTGRES_USER:-join}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-join}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    cpus: 1.0
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS required}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?CSRF_TRUSTED_ORIGINS required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      POSTGRES_DB: ${POSTGRES_DB:-join}
      POSTGRES_USER: ${POSTGRES_USER:-join}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@join.app}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - default
      - traefik
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.join-backend.rule=Host(`${DOMAIN:?DOMAIN required}`)"
      - "traefik.http.routers.join-backend.entrypoints=web,websecure"
      - "traefik.http.routers.join-backend.tls=true"
      - "traefik.http.routers.join-backend.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.join-backend.middlewares=join-backend-https-redirect@docker"
      - "traefik.http.middlewares.join-backend-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.join-backend.loadbalancer.server.port=8000"

  celery-worker:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 384m
    cpus: 0.5
    command: celery -A config worker --loglevel=info --concurrency=2
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      POSTGRES_DB: ${POSTGRES_DB:-join}
      POSTGRES_USER: ${POSTGRES_USER:-join}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-25}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-false}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@join.app}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    cpus: 0.25
    command: celery -A config beat --loglevel=info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      POSTGRES_DB: ${POSTGRES_DB:-join}
      POSTGRES_USER: ${POSTGRES_USER:-join}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    cpus: 0.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-join}
      POSTGRES_USER: ${POSTGRES_USER:-join}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - db_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do pg_dump -h db -U $$POSTGRES_USER $$POSTGRES_DB > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql; sleep 24h & wait $${!}; done;'"

networks:
  default:
  traefik:
    name: root_default
    external: true

volumes:
  postgres_data:
  db_backups:
