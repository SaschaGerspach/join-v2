<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="create-task-title" (click)="cancelled.emit()">
  <div class="modal-card" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 id="create-task-title">{{ 'TASK.NEW_TASK' | translate }}</h2>
      <button class="btn-close" [attr.aria-label]="'COMMON.CLOSE' | translate" (click)="cancelled.emit()">&#10005;</button>
    </div>

    <div class="modal-body">

      <div class="field-group">
        <label class="field-label" for="create-task-title-input">{{ 'TASK.TITLE' | translate }} *</label>
        <input
          id="create-task-title-input"
          #titleInput
          class="field-input"
          type="text"
          [(ngModel)]="title"
          [placeholder]="'TASK.TASK_TITLE_PLACEHOLDER' | translate"
          [class.field-error]="submitted && !title.trim()"
          (keyup.enter)="submit()"
        />
        @if (submitted && !title.trim()) {
          <span class="error-text">{{ 'TASK.TITLE_REQUIRED' | translate }}</span>
        }
      </div>

      <div class="field-group">
        <label class="field-label">{{ 'TASK.DESCRIPTION' | translate }}</label>
        <textarea
          class="field-textarea"
          rows="2"
          [(ngModel)]="description"
          [placeholder]="'TASK.DESCRIPTION_OPTIONAL' | translate"
        ></textarea>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">{{ 'TASK.PRIORITY' | translate }}</label>
          <div class="priority-options">
            @for (p of priorities; track p) {
              <button
                type="button"
                class="priority-btn"
                [class]="'priority-' + p"
                [class.active]="priority === p"
                [attr.aria-pressed]="priority === p"
                (click)="priority = p"
              >{{ 'BOARD_DETAIL.' + p.toUpperCase() | translate }}</button>
            }
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">{{ 'TASK.DUE_DATE' | translate }}</label>
          <input
            class="field-input"
            type="date"
            [(ngModel)]="dueDate"
          />
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">{{ 'TASK.COLUMN' | translate }}</label>
          <select class="field-select" [(ngModel)]="selectedColumnId">
            @for (col of columns(); track col.id) {
              <option [ngValue]="col.id">{{ col.title }}</option>
            }
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">{{ 'TASK.ASSIGN_TO' | translate }}</label>
          <div class="assignee-checklist">
            @for (c of contacts(); track c.id) {
              <label class="assignee-check-item">
                <input type="checkbox" [checked]="assignedTo.includes(c.id)" (change)="toggleAssignee(c.id)" />
                {{ c.first_name }} {{ c.last_name }}
              </label>
            }
            @if (contacts().length === 0) {
              <span class="no-contacts">{{ 'TASK.NO_CONTACTS' | translate }}</span>
            }
          </div>
        </div>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancelled.emit()">{{ 'COMMON.CANCEL' | translate }}</button>
      <button class="btn-save" (click)="submit()">{{ 'TASK.CREATE_TASK' | translate }}</button>
    </div>

  </div>
</div>
