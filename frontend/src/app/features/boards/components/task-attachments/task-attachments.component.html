<div class="field-group">
  <label class="field-label">Attachments</label>
  @if (imageAttachments().length > 0) {
    <div class="attachment-gallery">
      @for (att of imageAttachments(); track att.id) {
        <div class="gallery-item">
          <a [href]="att.url" target="_blank">
            <img [src]="att.url" [alt]="att.filename" class="gallery-thumb" />
          </a>
          <button class="btn-remove-thumb" aria-label="Delete attachment" (click)="deleteAttachment(att)">&#10005;</button>
        </div>
      }
    </div>
  }
  <div class="attachment-list">
    @for (att of fileAttachments(); track att.id) {
      <div class="attachment-item">
        <a [href]="att.url" target="_blank" class="attachment-link">{{ att.filename }}</a>
        <span class="attachment-size">{{ formatSize(att.size) }}</span>
        <button class="btn-remove-sub" aria-label="Delete attachment" (click)="deleteAttachment(att)">&#10005;</button>
      </div>
    }
    @if (attachments().length === 0) {
      <span class="comments-empty">No files attached.</span>
    }
  </div>
  <input
    type="file"
    class="file-input"
    aria-label="Upload attachment"
    accept=".png,.jpg,.jpeg,.gif,.webp,.pdf,.txt,.md,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip"
    (change)="onFileSelected($event)"
  />
</div>

@if (pendingDeleteAttachment()) {
  <app-confirm-dialog
    message="Delete this attachment? The file will be permanently removed."
    (confirmed)="confirmDeleteAttachment()"
    (cancelled)="pendingDeleteAttachment.set(null)"
  />
}
