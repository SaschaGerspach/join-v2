<div class="boards-page">
  <div class="boards-header">
    <h1>My Boards</h1>
    <button class="btn-add" (click)="showForm.set(true)">+ New Board</button>
  </div>

  @if (error()) {
    <p class="error-banner">{{ error() }}</p>
  }

  @if (showForm()) {
    <div class="board-form">
      <input
        class="form-input"
        type="text"
        [(ngModel)]="newTitle"
        placeholder="Board title"
        (keyup.enter)="createBoard()"
        autofocus
      />
      <div class="board-form-actions">
        <button class="btn-secondary" (click)="showForm.set(false)">Cancel</button>
        <button class="btn-primary" (click)="createBoard()">Create</button>
      </div>
    </div>
  }

  @if (loading()) {
    <app-loading-spinner />
  } @else if (boards().length === 0) {
    <div class="boards-empty">
      <p>No boards yet. Create your first board!</p>
    </div>
  } @else if (!loading()) {
    <div class="boards-grid">
      @for (board of boards(); track board.id) {
        <div class="board-card" (click)="openBoard(board.id)">
          <div class="board-card-body">
            <h2>{{ board.title }}</h2>
          </div>
          <div class="board-card-actions">
            <button class="btn-delete" (click)="deleteBoard(board.id, $event)" title="Delete board">&#10005;</button>
          </div>
        </div>
      }
    </div>
  }
</div>

@if (pendingDeleteId() !== null) {
  <app-confirm-dialog
    message="Delete this board? All columns and tasks will be lost."
    (confirmed)="confirmDelete()"
    (cancelled)="pendingDeleteId.set(null)"
  />
}
